version: 2
updates:
  # Enable version updates for yarn
  - package-ecosystem: 'npm'
    directory: '/'
    schedule:
      interval: 'weekly'
      day: 'monday'
      time: '09:00'
      timezone: 'UTC'
    open-pull-requests-limit: 3
    reviewers: []
    assignees: []
    commit-message:
      prefix: 'chore'
      prefix-development: 'chore'
      include: 'scope'
    groups:
      # Group production dependencies
      production-dependencies:
        dependency-type: 'production'
        patterns:
          - '@mui/*'
          - 'react*'
          - 'next*'
          - '@tanstack/*'
          - 'zustand'
          - 'immer'
          - '@emotion/*'
          - '@hookform/*'
          - '@screeb/*'
          - 'async-mutex'
          - 'axios'
          - 'crypto-js'
          - 'dayjs'
          - 'js-cookie'
          - 'mixpanel-browser'
          - 'next-intl'
          - 'react-color'
          - 'react-hook-form'
          - 'zod'
      # Group development dependencies
      development-dependencies:
        dependency-type: 'development'
        patterns:
          - 'eslint*'
          - '@typescript-eslint/*'
          - 'typescript-eslint'
          - '@eslint/*'
          - 'prettier'
          - '@stylistic/*'
          - 'stylelint*'
          - 'postcss*'
          - 'sass'
          - 'husky'
          - 'lint-staged'
          - '@types/*'
          - 'ts-node'
          - 'typescript'
          - '@commitlint/*'
          - '@semantic-release/*'
          - 'commitizen'
          - 'cz-conventional-changelog'
          - 'semantic-release'
          - 'style-dictionary'
          - 'identity-obj-proxy'
          - 'whatwg-fetch'
      # Group testing dependencies
      testing-dependencies:
        dependency-type: 'development'
        patterns:
          - '*jest*'
          - 'jest'
          - 'jest-environment-jsdom'
          - '@testing-library/*'
          - 'msw'
          - '@faker-js/*'
    ignore:
      # Ignore major version updates for stable packages
      - dependency-name: 'react'
        update-types: ['version-update:semver-major']
      - dependency-name: 'react-dom'
        update-types: ['version-update:semver-major']
      - dependency-name: 'next'
        update-types: ['version-update:semver-major']
      # Ignore specific packages that require manual updates
      - dependency-name: '@types/node'
        update-types: ['version-update:semver-major']

  # Enable version updates for GitHub Actions
  - package-ecosystem: 'github-actions'
    directory: '/'
    schedule:
      interval: 'weekly'
      day: 'monday'
      time: '09:00'
      timezone: 'UTC'
    open-pull-requests-limit: 2
    reviewers: []
    assignees: []
    commit-message:
      prefix: 'chore'
      include: 'scope'
