version: 2
updates:
  # CLI dependencies
  - package-ecosystem: 'npm'
    directory: '/'
    schedule:
      interval: 'weekly'
      day: 'monday'
      time: '09:00'
      timezone: 'UTC'
    open-pull-requests-limit: 9
    commit-message:
      prefix: 'chore'
      prefix-development: 'chore'
      include: 'scope'
    groups:
      # Group MUI dependencies separately for easier UI updates
      mui-dependencies:
        dependency-type: 'production'
        patterns:
          - '@mui/*'
      # Group React ecosystem dependencies
      react-ecosystem:
        dependency-type: 'production'
        patterns:
          - '@emotion/*'
          - 'react'
          - 'react-dom'
          - 'react-color'
          - 'react-hook-form'
          - '@hookform/*'
          - '@tanstack/react-query'
      # Group React dev tools
      react-dev-tools:
        dependency-type: 'development'
        patterns:
          - '@tanstack/react-query-devtools'
      # Group other production dependencies
      production-dependencies:
        dependency-type: 'production'
        patterns:
          - '@screeb/*'
          - 'async-mutex'
          - 'axios'
          - 'crypto-js'
          - 'dayjs'
          - 'immer'
          - 'js-cookie'
          - 'mixpanel-browser'
          - 'next'
          - 'next-intl'
          - 'zod'
          - 'zustand'
      # Group testing dependencies
      testing-dependencies:
        dependency-type: 'development'
        patterns:
          - '@testing-library/*'
          - 'jest'
          - 'jest-environment-jsdom'
          - '@faker-js/*'
          - 'whatwg-fetch'
          - 'identity-obj-proxy'
      # Group code quality and formatting tools
      code-quality-dependencies:
        dependency-type: 'development'
        patterns:
          - 'eslint'
          - 'eslint-config-*'
          - 'eslint-plugin-*'
          - '@eslint/*'
          - 'prettier'
          - 'husky'
          - 'lint-staged'
          - '@stylistic/*'
      # Group TypeScript and build tools
      typescript-build-dependencies:
        dependency-type: 'development'
        patterns:
          - '@types/*'
          - '@typescript-eslint/*'
          - 'typescript'
          - 'typescript-eslint'
          - 'ts-node'
          - 'sass'
          - 'style-dictionary'
          - 'stylelint*'
          - 'postcss*'
      # Group release and semantic tools
      release-tools:
        dependency-type: 'development'
        patterns:
          - '@semantic-release/*'
          - 'semantic-release'
      # Group commitlint and development tools
      development-tools:
        dependency-type: 'development'
        patterns:
          - '@commitlint/*'
          - 'commitizen'
          - 'cz-conventional-changelog'
    ignore:
      # Ignore major version updates for stable packages
      - dependency-name: 'react'
        update-types: ['version-update:semver-major']
      - dependency-name: 'react-dom'
        update-types: ['version-update:semver-major']
      - dependency-name: 'next'
        update-types: ['version-update:semver-major']
      # Ignore specific packages that require manual updates
      - dependency-name: '@types/node'
        update-types: ['version-update:semver-major']
      - dependency-name: 'typescript'
        update-types: ['version-update:semver-major']
      - dependency-name: 'eslint'
        update-types: ['version-update:semver-major']

  # Template dependencies
  - package-ecosystem: 'npm'
    directory: '/template'
    schedule:
      interval: 'weekly'
      day: 'monday'
      time: '09:00'
      timezone: 'UTC'
    open-pull-requests-limit: 8
    commit-message:
      prefix: 'chore'
      prefix-development: 'chore'
      include: 'scope'
    groups:
      # Same groups as CLI but for template dependencies
      mui-dependencies:
        dependency-type: 'production'
        patterns:
          - '@mui/*'
      react-ecosystem:
        dependency-type: 'production'
        patterns:
          - '@emotion/*'
          - 'react'
          - 'react-dom'
          - 'react-color'
          - 'react-hook-form'
          - '@hookform/*'
      production-dependencies:
        dependency-type: 'production'
        patterns:
          - '@screeb/*'
          - '@tanstack/react-query'
          - 'async-mutex'
          - 'axios'
          - 'crypto-js'
          - 'dayjs'
          - 'immer'
          - 'js-cookie'
          - 'mixpanel-browser'
          - 'next'
          - 'next-intl'
          - 'zod'
          - 'zustand'
      react-dev-tools:
        dependency-type: 'development'
        patterns:
          - '@tanstack/react-query-devtools'
      testing-dependencies:
        dependency-type: 'development'
        patterns:
          - '@testing-library/*'
          - 'jest'
          - 'jest-environment-jsdom'
          - '@faker-js/*'
          - 'whatwg-fetch'
          - 'identity-obj-proxy'
      code-quality-dependencies:
        dependency-type: 'development'
        patterns:
          - 'eslint'
          - 'eslint-config-*'
          - 'eslint-plugin-*'
          - '@eslint/*'
          - 'prettier'
          - 'husky'
          - 'lint-staged'
          - '@stylistic/*'
      typescript-build-dependencies:
        dependency-type: 'development'
        patterns:
          - '@types/*'
          - '@typescript-eslint/*'
          - 'typescript'
          - 'typescript-eslint'
          - 'ts-node'
          - 'sass'
          - 'style-dictionary'
          - 'stylelint*'
          - 'postcss*'
      development-tools:
        dependency-type: 'development'
        patterns:
          - '@commitlint/*'
          - 'commitizen'
          - 'cz-conventional-changelog'
    ignore:
      # Same ignore rules as CLI
      - dependency-name: 'react'
        update-types: ['version-update:semver-major']
      - dependency-name: 'react-dom'
        update-types: ['version-update:semver-major']
      - dependency-name: 'next'
        update-types: ['version-update:semver-major']
      - dependency-name: '@types/node'
        update-types: ['version-update:semver-major']
      - dependency-name: 'typescript'
        update-types: ['version-update:semver-major']
      - dependency-name: 'eslint'
        update-types: ['version-update:semver-major']

  # Enable version updates for GitHub Actions
  - package-ecosystem: 'github-actions'
    directory: '/'
    schedule:
      interval: 'weekly'
      day: 'monday'
      time: '09:00'
      timezone: 'UTC'
    open-pull-requests-limit: 2
    commit-message:
      prefix: 'chore(ci)'
      include: 'scope'
