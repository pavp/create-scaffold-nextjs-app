name: Sync Template Dependencies

on:
  pull_request:
    types: [opened, synchronize]
    paths:
      - 'package.json'

jobs:
  sync-template-deps:
    # Only run for dependabot PRs
    if: github.actor == 'dependabot[bot]'
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0
          ref: ${{ github.head_ref }}

      - name: Setup Node.js and Yarn
        uses: ./.github/actions/setup-node-yarn

      - name: Sync template dependencies
        run: node scripts/sync-template-deps.js

      - name: Check for changes
        id: check-changes
        run: |
          if git diff --quiet template/package.json; then
            echo "changes=false" >> $GITHUB_OUTPUT
          else
            echo "changes=true" >> $GITHUB_OUTPUT
          fi

      - name: Commit changes
        if: steps.check-changes.outputs.changes == 'true'
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add template/package.json
          git commit -m "chore(template): sync dependencies with root package.json

          Auto-sync template dependencies to match CLI updates from Dependabot."

      - name: Push changes
        if: steps.check-changes.outputs.changes == 'true'
        run: |
          git push origin ${{ github.head_ref }}
