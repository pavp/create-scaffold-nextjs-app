name: PR Validation

on:
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js and Yarn
        uses: ./.github/actions/setup-node-yarn

      - name: Run lint
        run: yarn lint

  typecheck:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js and Yarn
        uses: ./.github/actions/setup-node-yarn

      - name: Run typecheck
        run: yarn typecheck

  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js and Yarn
        uses: ./.github/actions/setup-node-yarn

      - name: Run tests
        run: yarn test --maxWorkers=2

  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js and Yarn
        uses: ./.github/actions/setup-node-yarn

      - name: Build project
        run: yarn build

  validate-commits:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js and Yarn
        uses: ./.github/actions/setup-node-yarn

      - name: Validate commit format
        run: |
          # Get PR commits and validate conventional commit format
          echo "Getting commits from origin/main to HEAD..."
          git log --format="%s" origin/main..HEAD > commits.txt

          if [ -s commits.txt ]; then
            echo "Validating commit messages..."
            while IFS= read -r commit_msg; do
              echo "Validating: $commit_msg"
              echo "$commit_msg" | npx commitlint
            done < commits.txt
          else
            echo "No commits to validate"
          fi

  # Summary job for branch protection
  ready-to-merge:
    runs-on: ubuntu-latest
    needs: [lint, typecheck, test, build, validate-commits]
    if: always()
    steps:
      - name: Check all jobs status
        run: |
          if [[ "${{ needs.lint.result }}" != "success" || "${{ needs.typecheck.result }}" != "success" || "${{ needs.test.result }}" != "success" || "${{ needs.build.result }}" != "success" || "${{ needs.validate-commits.result }}" != "success" ]]; then
            echo "❌ One or more validation jobs failed"
            echo "Lint: ${{ needs.lint.result }}"
            echo "Typecheck: ${{ needs.typecheck.result }}"
            echo "Test: ${{ needs.test.result }}"
            echo "Build: ${{ needs.build.result }}"
            echo "Commit validation: ${{ needs.validate-commits.result }}"
            exit 1
          fi
          echo "✅ PR is ready to merge!"
