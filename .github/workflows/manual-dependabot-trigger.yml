name: Manual Dependabot Trigger

on:
  workflow_dispatch:
    inputs:
      ecosystem:
        description: 'Package ecosystem to check'
        required: true
        default: 'all'
        type: choice
        options:
          - 'all'
          - 'npm'
          - 'github-actions'

jobs:
  trigger-dependabot:
    runs-on: ubuntu-latest
    name: Trigger Dependabot Updates

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Trigger NPM dependencies check
        if: ${{ github.event.inputs.ecosystem == 'npm' || github.event.inputs.ecosystem == 'all' }}
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          echo "🔄 Triggering Dependabot for NPM dependencies..."

          # Try different API endpoints for triggering Dependabot
          # Method 1: Try the public API (might be limited)
          curl -X POST \
            -H "Accept: application/vnd.github+json" \
            -H "Authorization: Bearer $GH_TOKEN" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            "https://api.github.com/repos/${{ github.repository }}/dependabot/updates" \
            -d '{"package_ecosystem":"npm"}' || echo "API method failed, trying alternative..."

          # Method 2: Create a small commit to trigger Dependabot
          echo "# Dependabot trigger - NPM $(date)" > .dependabot-npm-trigger
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add .dependabot-npm-trigger
          git commit -m "chore: trigger dependabot npm check" || echo "No changes to commit"
          git push || echo "Nothing to push"

      - name: Trigger GitHub Actions dependencies check
        if: ${{ github.event.inputs.ecosystem == 'github-actions' || github.event.inputs.ecosystem == 'all' }}
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          echo "🔄 Triggering Dependabot for GitHub Actions..."

          # Try the API first
          curl -X POST \
            -H "Accept: application/vnd.github+json" \
            -H "Authorization: Bearer $GH_TOKEN" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            "https://api.github.com/repos/${{ github.repository }}/dependabot/updates" \
            -d '{"package_ecosystem":"github-actions"}' || echo "API method failed, trying alternative..."

          # Create a small commit to trigger Dependabot
          echo "# Dependabot trigger - GitHub Actions $(date)" > .dependabot-actions-trigger
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add .dependabot-actions-trigger
          git commit -m "chore: trigger dependabot github-actions check" || echo "No changes to commit"
          git push || echo "Nothing to push"

      - name: Clean up trigger files
        run: |
          echo "🧹 Cleaning up trigger files..."
          git rm -f .dependabot-*-trigger || echo "No trigger files to clean"
          if [ -n "$(git status --porcelain)" ]; then
            git commit -m "chore: clean up dependabot trigger files"
            git push
          fi

      - name: Summary
        run: |
          echo "✅ Dependabot trigger completed for: ${{ github.event.inputs.ecosystem }}"
          echo "🔍 Check the Dependabot section in repository Insights for status updates"
          echo "📋 New dependency update PRs should appear shortly if updates are available"
