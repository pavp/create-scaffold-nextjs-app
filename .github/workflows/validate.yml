name: Validate PR

on:
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Cache package managers
        uses: actions/cache@v4
        with:
          path: |
            ~/.npm
            ~/.yarn
          key: ${{ runner.os }}-deps-${{ hashFiles('**/yarn.lock') }}

      - name: Cache Next.js build
        uses: actions/cache@v4
        with:
          path: ${{ github.workspace }}/.next/cache
          key: ${{ runner.os }}-nextjs-pr-${{ hashFiles('**/*.js', '**/*.jsx', '**/*.ts', '**/*.tsx') }}
          restore-keys: |
            ${{ runner.os }}-nextjs-main-
            ${{ runner.os }}-nextjs-

      - name: Install dependencies
        run: yarn install --frozen-lockfile

      - name: Run linter
        run: yarn lint

      - name: Build project
        run: yarn build

      - name: Validate commit format
        run: |
          # Get PR commits and validate conventional commit format
          echo "Getting commits from origin/main to HEAD..."
          git log --format="%s" origin/main..HEAD > commits.txt

          if [ -s commits.txt ]; then
            echo "Validating commit messages..."
            while IFS= read -r commit_msg; do
              echo "Validating: $commit_msg"
              echo "$commit_msg" | npx commitlint
            done < commits.txt
          else
            echo "No commits to validate"
          fi
